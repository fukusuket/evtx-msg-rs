name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Unit tests (macOS / Linux, no Windows required) ─────────────────────────
  unit:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test

  # ── Integration tests (Windows Server — online registry resolution) ─────────
  integration-windows:
    name: Integration tests (Windows Server)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Integration tests (requires Windows registry + system logs)
        # CARGO_BIN_EXE_evtx-msg-rs is set automatically by Cargo for integration tests.
        # The Windows Event Log service must be running (default on windows-latest).
        run: cargo test --test integration_windows -- --nocapture
